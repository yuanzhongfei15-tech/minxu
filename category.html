    <!-- 主内容区 -->
    <main class="main">
        <div class="container">

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <div class="filter-options">
                    <button class="filter-btn active" onclick="filterWords('all')">全部</button>
                    <button class="filter-btn" onclick="filterWords('verb')">动词</button>
                    <button class="filter-btn" onclick="filterWords('noun')">名词</button>
                    <button class="filter-btn" onclick="filterWords('adj')">形容词</button>
                    <button class="filter-btn" onclick="filterWords('phrase')">短语</button>
                </div>
                <select class="sort-select" id="sortSelect" onchange="sortWords()">
                    <option value="default">默认排序</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
            </div>

            <!-- 单词列表 -->
            <div id="wordsContainer" class="word-list">
                <!-- 动态加载 -->

    <script src="js/words-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentCategory = '';
        let currentPage = 1;
        let currentFilter = 'all';
        let wordsPerPage = 12;
        let allCategoryWords = [];
        let filteredWords = [];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 获取分类参数
            const category = getUrlParam('type') || 'high-frequency';
            currentCategory = category;
            
            // 加载分类信息
            loadCategoryInfo(category);
            
            // 加载单词列表
            loadCategoryWords(category);
            
            // 更新导航激活状态
            updateNavActiveState(category);
            
            // 搜索框回车事件
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchWord();
                }
            });
        });

        // 加载分类信息
        function loadCategoryInfo(category) {
            const info = getCategoryInfo(category);
            if (!info) return;
            
            const header = document.getElementById('categoryHeader');
            header.innerHTML = `
                <h1 class="category-title">
                    <span>${info.icon}</span>
                    ${info.name}
                </h1>
                <p class="category-description">${info.description}</p>
            `;
            
            // 更新页面标题
            setPageTitle(
                `${info.name} - 每日单词 | 免费英语学习`,
                `${info.description}，每日单词提供${info.count}+个${info.name}，帮助你系统学习英语。`
            );
        }

        // 加载分类单词
        function loadCategoryWords(category) {
            allCategoryWords = getWordsByCategory(category);
            filteredWords = [...allCategoryWords];
            currentPage = 1;
            renderWords();
        }

        // 渲染单词列表
        function renderWords() {
            const container = document.getElementById('wordsContainer');
            const start = (currentPage - 1) * wordsPerPage;
            const end = start + wordsPerPage;
            const pageWords = filteredWords.slice(start, end);
            
            if (pageWords.length === 0) {
                container.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <div class="no-results-icon">📭</div>
                        <h3 class="no-results-title">暂无单词</h3>
                        <p class="no-results-text">该分类下暂时没有单词</p>
                    </div>
                `;
            } else {
                container.innerHTML = pageWords.map(word => renderWordCard(word)).join('');
            }
            
            // 渲染分页
            const totalPages = Math.ceil(filteredWords.length / wordsPerPage);
            renderPagination(currentPage, totalPages, 'pagination', 'goToPage');
        }

        // 跳转到指定页
        function goToPage(page) {
            currentPage = page;
            renderWords();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 筛选单词
        function filterWords(type) {
            currentFilter = type;
            currentPage = 1;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 筛选单词
            if (type === 'all') {
                filteredWords = [...allCategoryWords];
            } else {
                filteredWords = allCategoryWords.filter(word => {
                    if (type === 'verb') {
                        return word.meanings.some(m => m.pos.includes('v.'));
                    } else if (type === 'noun') {
                        return word.meanings.some(m => m.pos.includes('n.'));
                    } else if (type === 'adj') {
                        return word.meanings.some(m => m.pos.includes('adj.'));
                    } else if (type === 'phrase') {
                        return word.word.includes(' ');
                    }
                    return true;
                });
            }
            
            renderWords();
        }

        // 排序单词
        function sortWords() {
            const sortType = document.getElementById('sortSelect').value;
            
            if (sortType === 'az') {
                filteredWords.sort((a, b) => a.word.localeCompare(b.word));
            } else if (sortType === 'za') {
                filteredWords.sort((a, b) => b.word.localeCompare(a.word));
            } else {
                // 默认排序（按ID）
                filteredWords.sort((a, b) => a.id.localeCompare(b.id));
            }
            
            currentPage = 1;
            renderWords();
        }

        // 更新导航激活状态
        function updateNavActiveState(category) {
            document.querySelectorAll('.nav-link[data-category], .mobile-nav-link[data-category]').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.category === category) {
                    link.classList.add('active');
                }
            });
        }

        // 搜索功能
        function searchWord() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.location.href = `search.html?q=${encodeURIComponent(query)}`;
            }
        }

        // 移动端菜单切换
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }
    </script>
