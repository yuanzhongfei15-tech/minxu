            <!-- 页面头部 -->

            <!-- 空状态 -->
            <div id="emptyState" class="favorites-empty" style="display: none;">
                <div class="favorites-empty-icon">⭐</div>
                <h3 class="favorites-empty-title">还没有收藏单词</h3>

    <script src="js/words-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadFavorites();
            
            // 搜索框回车事件
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchWord();
                }
            });
        });

        // 加载收藏列表
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favoriteWords') || '[]');
            const allWords = getAllWords();
            
            // 获取收藏的单词详情
            const favoriteWords = favorites.map(id => allWords.find(w => w.id === id)).filter(w => w);
            
            // 更新计数
            document.getElementById('favoritesCount').textContent = `已收藏 ${favoriteWords.length} 个单词`;
            
            // 渲染列表
            const container = document.getElementById('favoritesContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (favoriteWords.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                container.innerHTML = favoriteWords.map(word => renderWordCard(word)).join('');
            }
        }

        // 搜索功能
        function searchWord() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.location.href = `search.html?q=${encodeURIComponent(query)}`;
            }
        }

        // 移动端菜单切换
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }
    </script>
